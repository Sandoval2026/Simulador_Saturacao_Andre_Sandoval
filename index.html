<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Saturador de Carga</title>
</head>
<body>
  <h3>Fornecedores</h3>
  <select id="fornecedores"></select>

  <h3>Veículos</h3>
  <select id="veiculos"></select>

  <p id="ultimaAtualizacao" style="margin-top:20px; font-style:italic; color:gray;">
    Última atualização: nunca
  </p>

  <!-- PapaParse via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    let FORNECEDORES = {};
    let VEICULOS = [];

    async function carregarDados() {
      const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/1edVxMUyt2BpVspTPsjjTflJWN81k4IlFemjJDdDPjGY/gviz/tq?tqx=out:csv&gid=1832920211";
      
      const resp = await fetch(URL_PLANILHA);

      const csv = await resp.text();

      // Parse CSV com PapaParse
      const resultado = Papa.parse(csv, {
        header: true,
        skipEmptyLines: true
      });

      const dados = resultado.data;

      // Monta os objetos exatamente como no original
      FORNECEDORES = {};
      VEICULOS = [];

      dados.forEach(linha => {
        const fornecedor = linha["Fornecedor"];
        const veiculo = linha["Veiculo"];

        if (!fornecedor || !veiculo) return;

        if (!FORNECEDORES[fornecedor]) {
          FORNECEDORES[fornecedor] = [];
        }
        FORNECEDORES[fornecedor].push(veiculo);
        VEICULOS.push(veiculo);
      });

      // Ordenar fornecedores
      const fornecedoresOrdenados = Object.keys(FORNECEDORES).sort();

      // Preencher selects
      const selectFornecedores = document.getElementById("fornecedores");
      fornecedoresOrdenados.forEach(f => {
        const option = document.createElement("option");
        option.value = f;
        option.textContent = f;
        selectFornecedores.appendChild(option);
      });

      const veiculosUnicos = [...new Set(VEICULOS)].sort();
      const selectVeiculos = document.getElementById("veiculos");
      veiculosUnicos.forEach(v => {
        const option = document.createElement("option");
        option.value = v;
        option.textContent = v;
        selectVeiculos.appendChild(option);
      });

      console.log("FORNECEDORES:", FORNECEDORES);
      console.log("VEICULOS:", VEICULOS);
    }

    carregarDados();
  </script>
</body>
</html>
