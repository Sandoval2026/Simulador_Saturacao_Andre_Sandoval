<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Simulador de Saturação de Embalagens</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #0f1215;
  color: #e5e5e5;
}

h1, h2, h3 {
  color: #00e5a0;
  margin-bottom: 6px;
}

.section {
  margin-top: 18px;
  border: 1px solid #333;
  padding: 12px;
  background: #151a1f;
}

select, input, button {
  padding: 6px;
  margin-top: 4px;
  background: #0f1215;
  color: #e5e5e5;
  border: 1px solid #333;
}

button {
  cursor: pointer;
}

button.primary {
  background: #00e5a0;
  color: #000;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #333;
  padding: 6px;
  text-align: center;
}

th {
  background: #1d2329;
}

.alert {
  color: #ff6b6b;
  margin: 8px 0;
}

@media print {
  button { display: none; }
  body { background: #fff; color: #000; }
}
</style>
</head>

<body>

<h1>Simulador de Saturação de Embalagens</h1>
<p>v2.0 — Produção</p>

<div class="section">
  <h2>Adicionar embalagem à carga</h2>

  <label>Fornecedor</label><br>
  <select id="selectFornecedor" onchange="atualizarEmbalagens()"></select><br>

  <label>Embalagem</label><br>
  <select id="selectEmbalagem"></select><br>

  <button class="primary" onclick="adicionarEmbalagem()">
    + Adicionar embalagem à carga
  </button>
</div>

<div class="section">
  <h2>Embalagens da carga</h2>
  <div class="alert">⚠ Preencha a quantidade em todas as linhas.</div>

  <table>
    <thead>
      <tr>
        <th>Código / Fornecedor</th>
        <th>C × L × A (m)</th>
        <th>Qtde</th>
        <th></th>
      </tr>
    </thead>
