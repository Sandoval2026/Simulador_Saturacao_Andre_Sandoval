<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Saturador de Carga</title>
</head>
<body>
  <h3>Fornecedores</h3>
  <select id="fornecedores"></select>
  <h3>Veículos</h3>
  <select id="veiculos"></select>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    let FORNECEDORES = {};
    let VEICULOS = [];

    function formatarFornecedor(cadastro) {
      // Entrada:  "144871 - BOSCH REXROTH LTDA"
      // Saída:    "BOSCH REXROTH LTDA - 144871"
      const partes = cadastro.split(' - ');
      if (partes.length < 2) return cadastro; // fallback se não tiver " - "
      const codigo = partes[0].trim();
      const nome   = partes.slice(1).join(' - ').trim(); // protege nomes com " - " dentro
      return `${nome} - ${codigo}`;
    }

    async function carregarDados() {
      const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/1edVxMUyt2BpVspTPsjjTflJWN81k4IlFemjJDdDPjGY/gviz/tq?tqx=out:csv&gid=1832920211";

      const resp = await fetch(URL_PLANILHA);
      const csv  = await resp.text();
      const resultado = Papa.parse(csv, { header: true, skipEmptyLines: true });
      const dados = resultado.data;

      FORNECEDORES = {};
      VEICULOS     = [];

      dados.forEach(linha => {
        const cadastro = linha["Cadastro"];  // coluna C
        const veiculo  = linha["Veiculo"];
        if (!cadastro || !veiculo) return;

        const chave = formatarFornecedor(cadastro); // "NOME - CÓDIGO"

        if (!FORNECEDORES[chave]) FORNECEDORES[chave] = [];
        FORNECEDORES[chave].push(veiculo);
        VEICULOS.push(veiculo);
      });

      // Popula select de fornecedores — ordenado alfabeticamente pelo nome
      const selectFornecedores = document.getElementById("fornecedores");
      selectFornecedores.innerHTML = "";

      const fornecedoresOrdenados = Object.keys(FORNECEDORES).sort((a, b) => a.localeCompare(b, 'pt-BR'));

      fornecedoresOrdenados.forEach(f => {
        const option = document.createElement("option");
        option.value = f;
        option.textContent = f;
        selectFornecedores.appendChild(option);
      });

      // Popula select de veículos — únicos e ordenados
      const selectVeiculos = document.getElementById("veiculos");
      selectVeiculos.innerHTML = "";

      const veiculosUnicos = [...new Set(VEICULOS)].sort((a, b) => a.localeCompare(b, 'pt-BR'));
      veiculosUnicos.forEach(v => {
        const option = document.createElement("option");
        option.value = v;
        option.textContent = v;
        selectVeiculos.appendChild(option);
      });

      console.log("FORNECEDORES:", FORNECEDORES);
      console.log("VEICULOS:", VEICULOS);
    }

    carregarDados();
    setInterval(carregarDados, 3600000);
  </script>
</body>
</html>
